name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alpha
          POSTGRES_PASSWORD: alpha
          POSTGRES_DB: alpha_research_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alpha"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://alpha:alpha@localhost:5432/alpha_research_test?schema=public
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Push schema to test database
        run: bun run db:push

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Smoke-test seed
        run: bun run scripts/seed.ts
        env:
          DATABASE_URL: postgresql://alpha:alpha@localhost:5432/alpha_research_test?schema=public

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: alpha-research-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
